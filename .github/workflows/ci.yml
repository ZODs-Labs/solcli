name: ci

# Workflow disabled while v0 stabilises. Triggered only manually via
# `gh workflow run ci` or the Actions tab. Re-enable by restoring the
# `push` / `pull_request` triggers below when ready.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Verify architecture
        run: pnpm verify:architecture

      - name: Verify dependencies
        run: pnpm verify:deps

      - name: Test (unit + integration)
        run: pnpm test
        env:
          NO_UPDATE_NOTIFIER: "1"
          NO_COLOR: "1"
          CI: "true"

      - name: Package smoke
        run: pnpm package:smoke

      - name: Startup performance
        run: pnpm perf:startup

      - name: Upload dist on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-node-${{ matrix.node }}
          path: |
            apps/cli/dist/
            coverage/
          retention-days: 7
